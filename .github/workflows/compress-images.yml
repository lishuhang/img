# Compress images in lishuhang/img repo
# v2.0 (2026-07-04)
#
# Manually triggered (workflow_dispatch) or runs on push to master.
# Compresses PNG/JPEG/GIF losslessly, commits + pushes if savings > 1MB.
#
# Tools: oxipng (PNG, from GitHub releases), jpegoptim (JPEG, apt), gifsicle (GIF, apt)
# Typical savings: 15-40% with zero visible quality loss.
name: Compress Images

on:
  workflow_dispatch:
    inputs:
      min_size_kb:
        description: 'Only compress images larger than N KB (0 = all)'
        required: false
        default: '100'
      year_filter:
        description: 'Only specific years (e.g., "2021 2020", empty = all)'
        required: false
        default: ''
  push:
    branches: [master]
    paths:
      - '**.png'
      - '**.jpg'
      - '**.jpeg'
      - '**.gif'

permissions:
  contents: write

jobs:
  compress:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install compression tools
        run: |
          # jpegoptim and gifsicle are in apt
          sudo apt-get update
          sudo apt-get install -y jpegoptim gifsicle
          # oxipng: install from GitHub releases (not in apt)
          OXIPNG_VERSION="9.1.5"
          curl -sSL "https://github.com/shssoichiro/oxipng/releases/download/v${OXIPNG_VERSION}/oxipng-${OXIPNG_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            -o /tmp/oxipng.tar.gz
          tar -xzf /tmp/oxipng.tar.gz -C /tmp
          sudo mv /tmp/oxipng-${OXIPNG_VERSION}-x86_64-unknown-linux-musl/oxipng /usr/local/bin/
          sudo chmod +x /usr/local/bin/oxipng

      - name: Verify tools
        run: |
          oxipng --version
          jpegoptim --version 2>&1 | head -1
          gifsicle --version 2>&1 | head -1

      - name: Run compression (dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          MIN_SIZE: ${{ inputs.min_size_kb }}
          YEAR_FILTER: ${{ inputs.year_filter }}
        run: |
          set -e
          echo "=== Scanning images ==="
          find . -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" -o -name "*.gif" \) \
            -not -path "./.git/*" | wc -l

          echo "=== Compressing PNG (oxipng -o 4) ==="
          find . -type f -name "*.png" -not -path "./.git/*" -size +${MIN_SIZE}k \
            -print0 | xargs -0 -P $(nproc) -I {} oxipng -o 4 --strip safe --force {} || true

          echo "=== Compressing JPEG (jpegoptim --max=90) ==="
          find . -type f \( -name "*.jpg" -o -name "*.jpeg" \) -not -path "./.git/*" -size +${MIN_SIZE}k \
            -print0 | xargs -0 -P $(nproc) -I {} jpegoptim --max=90 --strip-all --all-progressive -f {} || true

          echo "=== Compressing GIF (gifsicle -O3) ==="
          find . -type f -name "*.gif" -not -path "./.git/*" -size +${MIN_SIZE}k \
            -print0 | xargs -0 -P $(nproc) -I {} sh -c 'gifsicle -O3 --no-extensions -o {}.tmp {} && mv {}.tmp {}' || true

      - name: Run compression (push, all images)
        if: github.event_name == 'push'
        run: |
          set -e
          echo "=== Compressing all PNG ==="
          find . -type f -name "*.png" -not -path "./.git/*" -size +50k \
            -print0 | xargs -0 -P $(nproc) -I {} oxipng -o 4 --strip safe --force {} || true
          echo "=== Compressing all JPEG ==="
          find . -type f \( -name "*.jpg" -o -name "*.jpeg" \) -not -path "./.git/*" -size +50k \
            -print0 | xargs -0 -P $(nproc) -I {} jpegoptim --max=90 --strip-all --all-progressive -f {} || true
          echo "=== Compressing all GIF ==="
          find . -type f -name "*.gif" -not -path "./.git/*" -size +50k \
            -print0 | xargs -0 -P $(nproc) -I {} sh -c 'gifsicle -O3 --no-extensions -o {}.tmp {} && mv {}.tmp {}' || true

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes after compression."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            # Calculate savings
            git diff --cached --stat | tail -3
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "compress: lossless image compression (automated)

          Ran oxipng -o 4 / jpegoptim --max=90 / gifsicle -O3
          Triggered by: ${{ github.event_name }}
          Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
          echo "Committed and pushed."
